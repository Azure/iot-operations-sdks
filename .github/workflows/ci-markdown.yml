name: CI-Markdown

on:
  workflow_dispatch:
  pull_request:
  schedule:
    - cron: "0 8 * * *" # Nightly at 1am PST

permissions:
  contents: read
  actions: read
  checks: write

jobs:
  spellcheck:
    name: CI-spelling
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Spell check
        uses: streetsidesoftware/cspell-action@v8
        continue-on-error: true
        with:
          files: "**/*"
          config: ".vscode/cspell.json"
          suggestions: true
          incremental_files_only: true

  # https://github.com/UmbrellaDocs/action-linkspector
  linkcheck:
    name: CI-links
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      # On PRs, detect whether the link-check config or workflow itself was
      # modified. If so, we want a full-repo scan (nofilter) instead of the
      # default per-PR-diff scan (added), since the change affects how every
      # link in the repo is validated.
      - name: Detect linkspector config changes
        if: github.event_name == 'pull_request'
        id: changes
        uses: dorny/paths-filter@v4
        with:
          filters: |
            config:
              - '.github/.linkspector.yml'
              - '.github/workflows/ci-markdown.yml'

      - name: Run linkspector
        uses: umbrelladocs/action-linkspector@v1
        with:
          config_file: .github/.linkspector.yml
          fail_on_error: true
          # nofilter (whole-repo scan) when:
          #   - nightly schedule, or
          #   - manual workflow_dispatch, or
          #   - a PR that modifies the link-check config / this workflow.
          # Otherwise (regular PRs), only check links on lines the PR added.
          filter_mode: ${{ (github.event_name == 'schedule' || github.event_name == 'workflow_dispatch' || steps.changes.outputs.config == 'true') && 'nofilter' || 'added' }}

name: CI-stub-services

on:
  workflow_dispatch:
  pull_request:
    paths:
      - '.github/workflows/ci-stub-services.yml'
      - '.github/workflows/_rust-tool-check.yml'
      - 'tools/azure_iot_operations_stub_services/**'
      - 'rust/scripts/**'
  push:
    branches:
      - main
  schedule:
    - cron: '0 11 * * *'  # Nightly (04:00 PT)

concurrency:
  group: ${{ github.workflow }}-${{ github.head_ref || github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  check:
    uses: ./.github/workflows/_rust-tool-check.yml
    with:
      name: stub-services
      path: tools/azure_iot_operations_stub_services
      aio-sdks-registry: false
    secrets:
      aio-sdks-token: ${{ secrets.CARGO_REGISTRIES_AIO_SDKS_TOKEN }}

name: CI-dotnet

on:
  workflow_dispatch:
  pull_request:
    paths:
      - 'dotnet/**'
      - 'eng/test/test-cases/Protocol/**'
      - 'eng/test/faultablemqttbroker/**'      
      - 'tools/dsscli/**'
      - 'codegen/**'
  push:
    branches:
    - main  
  schedule:
  - cron: '0 11 * * *'  # Nightly at 4am PST

permissions:
  contents: read
  actions: read
  checks: write
  id-token: write # Require write permission to Fetch an OIDC token.

jobs:
  build:

    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
    - uses: actions/checkout@v4
      with:
        fetch-depth: 0

    - name: Setup cluster
      run: |
        tools/deployment/initialize-cluster.sh

    - uses: azure/login@v2
      with:
        client-id: ${{ secrets.AZURE_CLIENT_ID }}
        tenant-id: ${{ secrets.AZURE_TENANT_ID }}
        subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}
        allow-no-subscriptions: true

    - name: Deploy AIO
      run: |        
        echo "Starting postCreateCommand"

        export BASE_NAME=timtay-test-cluster

        # create environment variables to support deployment
        export SUBSCRIPTION_ID=${{ secrets.AZURE_SUBSCRIPTION_ID }}
        export CLUSTER_NAME=${BASE_NAME}
        export STORAGE_ACCOUNT=timtaytestclusterstorage
        export SCHEMA_REGISTRY=${BASE_NAME}schema
        export SCHEMA_REGISTRY_NAMESPACE=${BASE_NAME}schemans

        export RESOURCE_GROUP=iot-operations-sdks-github-actions-resources
        export LOCATION=westus3

        echo "Ending postCreateCommand"

        tools/deployment/install-aio-extension.sh

    - name: Tear Down AIO
      if: always()
      run: |
        az storage account create --name $STORAGE_ACCOUNT --resource-group $RESOURCE_GROUP
        az iot ops schema registry delete --name $SCHEMA_REGISTRY --resource-group $RESOURCE_GROUP 
        az connectedk8s delete --name $CLUSTER_NAME --resource-group $RESOURCE_GROUP



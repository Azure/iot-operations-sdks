name: CI-dotnet

on:
  workflow_dispatch:
  pull_request:
    paths:
      - 'dotnet/**'
      - 'eng/test/test-cases/Protocol/**'
      - 'eng/test/faultablemqttbroker/**'      
      - 'tools/dsscli/**'
      - 'codegen/**'
  push:
    branches:
    - main  
  schedule:
  - cron: '0 11 * * *'  # Nightly at 4am PST

permissions:
  contents: read
  actions: read
  checks: write
  id-token: write # Require write permission to Fetch an OIDC token.

jobs:
  build:

    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
    - uses: actions/checkout@v4
      with:
        fetch-depth: 0

    - uses: azure/login@v2
      with:
        client-id: ${{ secrets.AZURE_CLIENT_ID }}
        tenant-id: ${{ secrets.AZURE_TENANT_ID }}
        subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}
        allow-no-subscriptions: true

    - uses: azure/cli@v2
      with:
        azcliversion: latest
        inlineScript: |
          az extension add -n aksarc --upgrade
          az extension add -n customlocation --upgrade
          az extension add -n stack-hci-vm --upgrade
          az extension add -n connectedk8s --upgrade

          az aks create \
              --resource-group iot-operations-sdks-github-actions-resources \
              --name timtay-test-aks \
              --node-count 1 \
              --generate-ssh-keys \
              --tier free \
              --node-vm-size Standard_D2s_v3

          az provider register -n "Microsoft.ExtendedLocation"
          az provider register -n "Microsoft.Kubernetes"
          az provider register -n "Microsoft.KubernetesConfiguration"
          az provider register -n "Microsoft.IoTOperations"
          az provider register -n "Microsoft.DeviceRegistry"
          az provider register -n "Microsoft.SecretSyncController"

          az connectedk8s connect --name timtay-test-aks --location westus --resource-group iot-operations-sdks-github-actions-resources
          export OBJECT_ID=$(az ad sp show --id bc313c14-388c-4e7d-a58e-70017303ee3b --query id -o tsv)
          az connectedk8s enable-features -n timtay-test-aks -g iot-operations-sdks-github-actions-resources --custom-locations-oid $OBJECT_ID --features cluster-connect custom-locations

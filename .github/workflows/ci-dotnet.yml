name: CI-dotnet

on:
  workflow_dispatch:
  pull_request:
    paths:
      - 'dotnet/**'
      - 'eng/test/test-cases/Protocol/**'
      - 'eng/test/faultablemqttbroker/**'      
      - 'tools/dsscli/**'
      - 'codegen/**'
  push:
    branches:
    - main  
  schedule:
  - cron: '0 11 * * *'  # Nightly at 4am PST

permissions:
  contents: read
  actions: read
  checks: write
  id-token: write # Require write permission to Fetch an OIDC token.

jobs:
  build:

    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
    - uses: actions/checkout@v4
      with:
        fetch-depth: 0

    - name: Setup cluster
      run: |
        tools/deployment/initialize-cluster.sh
        tools/deployment/deploy-aio.sh nightly

    - uses: azure/login@v2
      with:
        client-id: ${{ secrets.AZURE_CLIENT_ID }}
        tenant-id: ${{ secrets.AZURE_TENANT_ID }}
        subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}
        allow-no-subscriptions: true

    - name: Deploy AIO
      run: |        
        echo "Starting postCreateCommand"

        BASE_NAME=timtay-test-cluster

        # create environment variables to support deployment
        echo "export SESSION=$PWD/.session
        export CLUSTER_NAME=${BASE_NAME}
        export STORAGE_ACCOUNT=${BASE_NAME}storage
        export SCHEMA_REGISTRY=${BASE_NAME}schema
        export SCHEMA_REGISTRY_NAMESPACE=${BASE_NAME}schemans" >> ~/.bashrc

        export RESOURCE_GROUP=aio-${BASE_NAME}
        export LOCATION=westus3

        echo "Environment:
            SUBSCRIPTION_ID:           $SUBSCRIPTION_ID
            RESOURCE_GROUP:            $RESOURCE_GROUP
            LOCATION:                  $LOCATION
            CLUSTER_NAME:              $CLUSTER_NAME
            STORAGE_ACCOUNT:           $STORAGE_ACCOUNT
            SCHEMA_REGISTRY:           $SCHEMA_REGISTRY
            SCHEMA_REGISTRY_NAMESPACE: $SCHEMA_REGISTRY_NAMESPACE"

        echo "Ending postCreateCommand"

        tools/deployment/install-aio-extension.sh


apiVersion: namespaces.deviceregistry.microsoft.com/v1
kind: Asset
metadata:
  name: my-rest-thermostat-asset1
  namespace: azure-iot-operations
spec:
  uuid: 223e4567-e89b-12d3-a456-426614174111
  attributes:
    assetId: my-rest-thermostat-asset1
    assetType: rest-thermostat-asset
  datasets:
    - name: weather-sensor-dataset
      dataSource: /api/sensor/env # The relative HTTP server path to GET data from
      destinations:
        - configuration:
            topic: mqtt/machine/asset1/status # The MQTT topic to forward the sampled data to
          target: Mqtt
  deviceRef:
    deviceName: my-rest-thermostat-device-name
    endpointName: my-rest-thermostat-endpoint-name
  version: 1
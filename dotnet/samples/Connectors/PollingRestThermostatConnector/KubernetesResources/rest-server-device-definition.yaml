apiVersion: namespaces.deviceregistry.microsoft.com/v1
kind: Device
metadata:
  name: my-rest-thermostat-device-name
  namespace: azure-iot-operations
spec:
  attributes:
    deviceId: my-thermostat
    deviceType: thermostat-device-type
  enabled: true
  endpoints:
    inbound:
      my-rest-thermostat-endpoint-name:
        additionalConfiguration: '{}'
        version: "0.0.1"
        endpointType: rest-thermostat-endpoint-type
        
        #Configure to use username + password access to the HTTP server
        address: http://rest-test-server.azure-iot-operations.svc.cluster.local:8081
        authentication:
          method: UsernamePassword
          usernamePasswordCredentials:
            usernameSecretName: rest-server-auth-credentials/username
            passwordSecretName: rest-server-auth-credentials/password

        #Configure to use anonymous access to the HTTP server
        #address: http://rest-test-server.azure-iot-operations.svc.cluster.local:8080
  uuid: 1234-5678-9012-3456
  version: 2
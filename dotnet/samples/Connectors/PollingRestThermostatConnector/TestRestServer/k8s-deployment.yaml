# HTTP Test Server Deployment (Full - with TLS and Authentication)
# Note: This deployment requires secrets to be applied first using k8s-secrets.yaml
apiVersion: apps/v1
kind: Deployment
metadata:
  name: rest-test-server
  namespace: default
  labels:
    app: rest-test-server
spec:
  replicas: 1
  selector:
    matchLabels:
      app: rest-test-server
  template:
    metadata:
      labels:
        app: rest-test-server
    spec:
      containers:
      - name: rest-test-server
        image: mcr.microsoft.com/azureiotoperations/rest-test-server:0.4.0
        imagePullPolicy: Always
        ports:
        - containerPort: 8080
          name: http-anon
          protocol: TCP
        - containerPort: 8081
          name: http-basic
          protocol: TCP
        - containerPort: 8443
          name: https-anon
          protocol: TCP
        - containerPort: 8444
          name: https-basic
          protocol: TCP
        - containerPort: 8445
          name: https-mtls
          protocol: TCP
        env:
        - name: TLS_CERT_PATH
          value: /secrets/server.crt
        - name: TLS_KEY_PATH
          value: /secrets/server.key
        - name: TLS_CA_PATH
          value: /secrets/ca.crt
        - name: TLS_INTERMEDIATE_PATH
          value: /secrets/intermediate.crt
        - name: AUTH_USERNAME_PATH
          value: /secrets/username
        - name: AUTH_PASSWORD_PATH
          value: /secrets/password
        volumeMounts:
        - name: server-secrets
          mountPath: /secrets
          readOnly: true
      volumes:
      - name: server-secrets
        secret:
          secretName: rest-test-server-secrets
---
# HTTP Test Server Service
apiVersion: v1
kind: Service
metadata:
  name: rest-test-server
  namespace: default
  labels:
    app: rest-test-server
spec:
  type: ClusterIP
  ports:
  - port: 8080
    targetPort: 8080
    protocol: TCP
    name: http-anon
  - port: 8081
    targetPort: 8081
    protocol: TCP
    name: http-basic
  - port: 8443
    targetPort: 8443
    protocol: TCP
    name: https-anon
  - port: 8444
    targetPort: 8444
    protocol: TCP
    name: https-basic
  - port: 8445
    targetPort: 8445
    protocol: TCP
    name: https-mtls
  selector:
    app: rest-test-server

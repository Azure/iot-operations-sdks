apiVersion: namespaces.deviceregistry.microsoft.com/v1
kind: Asset
metadata:
  name: my-mgmt-action-asset
  namespace: azure-iot-operations
spec:
  uuid: 3456-7890-1234-5678
  attributes:
    assetId: my-mgmt-action-asset
    assetType: mgmt-action-sample
  # -----------------------------------------------------------------
  # Single management group with a single action, intended for
  # exercising the upcoming .NET Management Action API. The connector
  # will expose this as:
  #   group  = "device-control"
  #   action = "reboot"
  # keyed internally as "device-control::reboot".
  # -----------------------------------------------------------------
  managementGroups:
    - name: device-control
      defaultTimeoutInSeconds: 30
      managementGroupConfiguration: '{}'
      actions:
        - name: reboot
          # ActionType values: Call | Read | Write (see AssetManagementGroupActionType)
          actionType: Call
          targetUri: device://reboot
          topic: mgmt/device-1/asset-1/device-control/reboot
          timeoutInSeconds: 15
          actionConfiguration: '{}'
        - name: readTemperature
          actionType: Read
          targetUri: device://read-temperature
          topic: mgmt/device-1/asset-1/device-control/read-temperature
          timeoutInSeconds: 15
          actionConfiguration: '{}'
        - name: writeConfiguration
          actionType: Write
          targetUri: device://write-configuration
          topic: mgmt/device-1/asset-1/device-control/write-configuration
          timeoutInSeconds: 15
          actionConfiguration: '{}'
  defaultDatasetsConfiguration: '{}'
  deviceRef:
    deviceName: my-mgmt-action-device
    endpointName: my_mgmt_endpoint
  version: 1


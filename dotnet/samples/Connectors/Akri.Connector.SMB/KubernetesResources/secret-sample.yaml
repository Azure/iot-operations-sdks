apiVersion: v1
kind: Secret
metadata:
  name: smb-connector-secrets
  labels:
    app: smb-connector
type: Opaque
stringData:
  # Do NOT store real secrets in the repository. Use sealed-secrets or external secret managers in production.
  KEYVAULT_URL: "https://your-keyvault.vault.azure.net/"
  KEYVAULT_SECRET_NAME: "smb-password"
  SMB_PASSWORD: "<base64 or plain depending on your environment>"

